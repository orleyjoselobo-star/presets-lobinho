<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobinho Presets</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #fafafa; margin: 0; }
        .header { background: white; border-bottom: 1px solid #dbdbdb; padding: 20px; text-align: center; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 935px; margin: 30px auto; padding: 0 20px; }
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; }
        .preset-card { background: white; border: 1px solid #dbdbdb; position: relative; aspect-ratio: 1 / 1; overflow: hidden; }
        .preset-card img { width: 100%; height: 100%; object-fit: cover; }
        .info-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; background: rgba(0,0,0,0.4); opacity: 0; transition: opacity 0.3s; }
        .preset-card:hover .info-overlay { opacity: 1; }
        .download-btn { background: #0095f6; color: white; border: none; padding: 8px 12px; border-radius: 4px; text-decoration: none; font-weight: bold; font-size: 13px; }
        @media (max-width: 600px) { .gallery { gap: 3px; } .container { padding: 0; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>📸 Presets Lobinho</h1>
        <p>Ajustes profesionales para Lightroom</p>
    </div>
    <div class="container">
        <div class="gallery">
            <div class="preset-card">
                <img src="1212.jpg">
                <div class="info-overlay">
                    <a href="1212.jpg" download class="download-btn">Descargar</a>
                </div>
            </div>
            <div class="preset-card">
                <img src="1313.jpg">
                <div class="info-overlay">
                    <a href="1313.jpg" download class="download-btn">Descargar</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

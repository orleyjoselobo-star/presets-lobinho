<script>
    const USER = 'orleyjoselobo-star';
    const REPO = 'presets-lobinho';

    async function cargarGaleria() {
        const gallery = document.getElementById('presets-gallery');
        
        try {
            // Usamos la URL de la API de GitHub
            const url = `https://api.github.com/repos/${USER}/${REPO}/contents/img`;
            const response = await fetch(url);
            
            if (!response.ok) {
                throw new Error('Error al conectar con la API');
            }

            const archivos = await response.json();
            gallery.innerHTML = ''; 

            archivos.forEach(archivo => {
                // Verificamos que sea una imagen
                if (archivo.name.toLowerCase().endsWith('.jpg') || 
                    archivo.name.toLowerCase().endsWith('.png')) {
                    
                    const nombreBase = archivo.name.split('.').slice(0, -1).join('.');
                    
                    const tarjeta = document.createElement('div');
                    tarjeta.className = 'preset-card';
                    
                    tarjeta.innerHTML = `
                        <div class="card-image-container">
                            <img src="img/${archivo.name}" alt="${nombreBase}">
                        </div>
                        <div class="card-details">
                            <h3>${nombreBase.replace(/_/g, ' ')}</h3>
                            <a href="presets/${nombreBase}.dng" download class="download-btn">
                                Descargar DNG
                            </a>
                        </div>
                    `;
                    gallery.appendChild(tarjeta);
                }
            });
        } catch (e) {
            console.error(e);
            gallery.innerHTML = '<p style="color:white;">Error al cargar las imágenes. Intenta recargar la página.</p>';
        }
    }

    window.onload = cargarGaleria;
</script>

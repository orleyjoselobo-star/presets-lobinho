<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobinho Presets | Premium Lightroom Assets</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Open+Sans:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #ffeb3b;
            --hover-color: #2a2a2a;
        }

        body { 
            font-family: 'Open Sans', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            font-weight: 300;
        }

        h1, h3 { 
            font-family: 'Montserrat', sans-serif; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            color: white;
        }

        .header { 
            padding: 60px 20px; 
            text-align: center; 
            border-bottom: 1px solid #333;
        }
        
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .header p { 
            font-size: 1rem; 
            color: #aaa; 
            max-width: 600px; 
            margin: 0 auto; 
            line-height: 1.6;
        }

        .container { 
            max-width: 1200px; 
            margin: 50px auto; 
            padding: 0 30px; 
        }

        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 40px; 
        }

        .preset-card { 
            background: var(--card-bg); 
            border-radius: 8px; 
            overflow: hidden; 
            transition: all 0.3s ease; 
            border: 1px solid #222;
        }

        .preset-card:hover { 
            transform: translateY(-5px); 
            border-color: #444; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .card-image-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
        }

        .preset-card img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: transform 0.5s ease;
        }

        .preset-card:hover img { transform: scale(1.05); }

        .card-details { padding: 25px; text-align: center; }

        .card-details h3 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            text-transform: none;
            letter-spacing: 0;
        }

        .download-btn { 
            display: inline-block;
            background: transparent; 
            color: var(--accent-color); 
            border: 2px solid var(--accent-color); 
            padding: 10px 25px; 
            border-radius: 4px; 
            text-decoration: none; 
            font-family: 'Montserrat', sans-serif;
            font-weight: 600; 
            font-size: 12px; 
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .download-btn:hover { 
            background: var(--accent-color); 
            color: var(--bg-color); 
            box-shadow: 0 0 15px rgba(255, 235, 59, 0.5);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📸 LOBINHO PRESETS</h1>
        <p>Colección exclusiva de ajustes profesionales. Transforma tus fotos con estilo premium.</p>
    </div>
    
    <div class="container">
        <!-- El motor de JavaScript llenará esta sección -->
        <div class="gallery" id="presets-gallery">
            <p style="text-align: center; color: #aaa; width: 100%;">Cargando galería profesional...</p>
        </div>
    </div>

    <script>
        const USER = 'orleyjoselobo-star';
        const REPO = 'presets-lobinho';

        async function cargarGaleria() {
            const gallery = document.getElementById('presets-gallery');
            try {
                const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/img`);
                const archivos = await response.json();
                
                if (!Array.isArray(archivos)) throw new Error();

                gallery.innerHTML = ''; 

                archivos.forEach(archivo => {
                    if (archivo.name.match(/\.(jpg|jpeg|png)$/i)) {
                        const nombreBase = archivo.name.split('.').slice(0, -1).join('.');
                        const tarjeta = document.createElement('div');
                        tarjeta.className = 'preset-card';
                        
                        tarjeta.innerHTML = `
                            <div class="card-image-container">
                                <img src="img/${archivo.name}" alt="${nombreBase}">
                            </div>
                            <div class="card-details">
                                <h3>${nombreBase.replace(/_/g, ' ')}</h3>
                                <a href="presets/${nombreBase}.dng" download class="download-btn">Descargar DNG</a>
                            </div>
                        `;
                        gallery.appendChild(tarjeta);
                    }
                });
            } catch (e) {
                gallery.innerHTML = '<p style="color:white; text-align:center;">Sube fotos a la carpeta /img para activar la galería.</p>';
            }
        }
        window.onload = cargarGaleria;
    </script>
</body>
</html>

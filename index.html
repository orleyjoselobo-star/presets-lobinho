<script>
    const USER = 'orleyjoselobo-star';
    const REPO = 'presets-lobinho';

    async function cargarGaleriaManual() {
        const gallery = document.getElementById('presets-gallery');
        
        try {
            // Le pedimos a GitHub la lista de archivos en la carpeta /img
            const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/img`);
            const archivos = await response.json();

            gallery.innerHTML = ''; 

            archivos.forEach(archivo => {
                // Filtramos solo archivos de imagen
                if (archivo.name.match(/\.(jpg|jpeg|png)$/i)) {
                    const nombreBase = archivo.name.split('.').slice(0, -1).join('.');
                    
                    const tarjeta = document.createElement('div');
                    tarjeta.className = 'preset-card';
                    
                    // Generamos el HTML dinámico
                    tarjeta.innerHTML = `
                        <div class="card-image-container">
                            <img src="img/${archivo.name}" alt="${nombreBase}" loading="lazy">
                        </div>
                        <div class="card-details">
                            <h3>${nombreBase.replace(/_/g, ' ')}</h3>
                            <a href="presets/${nombreBase}.dng" download class="download-btn">
                                Descargar DNG
                            </a>
                        </div>
                    `;
                    gallery.appendChild(tarjeta);
                }
            });
        } catch (e) {
            gallery.innerHTML = '<p>Sube fotos a la carpeta /img para verlas aquí.</p>';
        }
    }

    window.onload = cargarGaleriaManual;
</script>
